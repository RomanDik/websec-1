<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">

        <div class="input-row">
            <input type="text" id="num1" placeholder="0">
            <select id="operation">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>
            <input type="text" id="num2" placeholder="0">
        </div>

        <button id="calculate-btn">подсчитать</button>

        <div class="result-container">
            <div id="history"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
